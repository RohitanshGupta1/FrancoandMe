<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohitansh | Socials</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#111,#222,#000);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    animation:fadeIn 1.5s ease;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    width:320px;
}

h1{
    margin-bottom:10px;
}

p{
    color:#ccc;
    margin-bottom:25px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    background:#5865F2;
    padding:14px;
    margin:12px 0;
    border-radius:10px;
    transition:0.3s;
    font-weight:bold;
}

.btn:hover{
    transform:scale(1.05);
    background:#4752C4;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>👋 Hi, I'm Rohitansh</h1>
    <p>Follow me on my social media!</p>

    <a class="btn" href="https://youtube.com/@justrohitansh" target="_blank">
        ▶️ YouTube
    </a>

    <a class="btn" href="https://www.instagram.com/kid_who_codes?igsh=aGt4azBvOWk1cHEw" target="_blank">
        📸 Instagram
    </a>

    <a class="btn" href="https://x.com/RohitAnshFRFR" target="_blank">
        ✖️ X (Twitter)
    </a>
</div>

</body>
</html>
